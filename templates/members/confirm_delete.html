{% extends 'base.html' %}

{% block title %}Eliminar Miembro - SG Church{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0">
                    <h4 class="mb-0">Confirmar Eliminación</h4>
                </div>
                <div class="card-body">
                    <p>¿Estás seguro de que deseas eliminar al miembro <strong>{{ member.full_name }}</strong>?</p>
                    <p class="text-muted">Esta acción no se puede deshacer.</p>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between">
                    <a href="{% url 'member_detail' member.pk %}" class="btn btn-secondary">Cancelar</a>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
