{% extends "base.html" %}

{% block title %}Configuración - Onboarding{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Progress Steps -->
            <div class="mb-4">
                <div class="progress" style="height: 4px;">
                    <div class="progress-bar bg-success" role="progressbar" style="width: 75%;"></div>
                </div>
                <div class="d-flex justify-content-between mt-2">
                    <span class="text-success fw-bold">Iglesia</span>
                    <span class="text-success fw-bold">Admin</span>
                    <span class="text-primary fw-bold">Configuración</span>
                    <span class="text-muted">Listo</span>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0">
                    <h4 class="mb-0">Configuración Basic</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="currency" class="form-label">Moneda</label>
                                <select class="form-select" id="currency" name="currency">
                                    <option value="USD" selected>Dólar estadounidense (USD)</option>
                                    <option value="EUR">Euro (EUR)</option>
                                    <option value="MXN">Peso mexicano (MXN)</option>
                                    <option value="COP">Peso colombiano (COP)</option>
                                    <option value="ARS">Peso argentino (ARS)</option>
                                    <option value="BRL">Real brasileño (BRL)</option>
                                    <option value="GBP">Libra esterlina (GBP)</option>
                                    <option value="CAD">Dólar canadiense (CAD)</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="timezone" class="form-label">Zona Horaria</label>
                                <select class="form-select" id="timezone" name="timezone">
                                    <option value="America/New_York" selected>Este (EE.UU.)</option>
                                    <option value="America/Chicago">Centro (EE.UU.)</option>
                                    <option value="America/Denver">Montaña (EE.UU.)</option>
                                    <option value="America/Los_Angeles">Pacífico (EE.UU.)</option>
                                    <option value="America/Mexico_City">Ciudad de México</option>
                                    <option value="America/Bogota">Bogotá</option>
                                    <option value="America/Buenos_Aires">Buenos Aires</option>
                                    <option value="Europe/Madrid">Madrid</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="date_format" class="form-label">Formato de Fecha</label>
                            <select class="form-select" id="date_format" name="date_format">
                                <option value="DD/MM/YYYY" selected>DD/MM/YYYY</option>
                                <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                                <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                            </select>
                        </div>

                        <hr class="my-4">

                        <h5 class="mb-3">Opciones</h5>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="enable_families" name="enable_families" checked>
                            <label class="form-check-label" for="enable_families">
                                Habilitar gestión de familias
                            </label>
                            <div class="form-text">Permite agrupar miembros en unidades familiares</div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="enable_tags" name="enable_tags" checked>
                            <label class="form-check-label" for="enable_tags">
                                Habilitar etiquetas
                            </label>
                            <div class="form-text">Permite categorizar miembros con etiquetas</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                Completar Configuración <i class="bi bi-check-lg"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
