{% extends 'base.html' %}

{% block title %}Etiquetas - SG Church{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0"><i class="bi bi-tags"></i> Etiquetas</h1>
        </div>
        <div>
            <a href="{% url 'tag_create' %}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nueva Etiqueta
            </a>
        </div>
    </div>

    <!-- Tags Grid -->
    <div class="row">
        {% for tag in tags %}
        <div class="col-md-3 mb-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge fs-6" style="background-color: {{ tag.color }};">
                            {{ tag.name }}
                        </span>
                        <span class="text-muted">{{ tag.members.count }}</span>
                    </div>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between">
                    <a href="{% url 'tag_update' tag.pk %}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="{% url 'tag_delete' tag.pk %}" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center text-muted py-4">
                    No hay etiquetas registradas.
                    <a href="{% url 'tag_create' %}" class="btn btn-sm btn-primary ms-2">
                        Crear la primera etiqueta
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
