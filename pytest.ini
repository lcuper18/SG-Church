[pytest]
# Django settings module
DJANGO_SETTINGS_MODULE = sg_church.settings.test

# Test discovery patterns
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Add options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --reuse-db
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --no-cov-on-fail

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: end-to-end tests with Playwright
    integration: integration tests
    unit: unit tests

# Coverage settings
[coverage:run]
omit = 
    */migrations/*
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */virtualenv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
