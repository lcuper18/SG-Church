# SG Church - Django Project Configuration

[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    */migrations/*,
    venv,
    .venv,
    env
ignore = E501, W503

[isort]
profile = django
line_length = 120
skip_glob = */migrations/*

[black]
line-length = 120
target-version = ['py311']
exclude = '''
/(
    \.git
  | \.venv
  | migrations
)/
'''

[tool:pytest]
DJANGO_SETTINGS_MODULE = sg_church.settings.local
python_files = tests.py test_*.py *_tests.py
addopts = --verbose --strict-markers
